plugins {
    id 'application'
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.seleniumhq.selenium:selenium-java:4.31.0'
    testImplementation 'org.testng:testng:7.11.0'
}

application {tasks.register('prepareDocs', Copy) {
    description = 'Copies website files to docs folder'
    group = 'documentation'

    from('src/main/resources/website') {
        include '**/*.html', '**/*.css', '**/*.png'
    }

    into("$rootDir/docs")
}
    mainClass = 'org.example.Main'
}
test {
    useTestNG()
}